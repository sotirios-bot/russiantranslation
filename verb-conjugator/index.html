<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Russian Verb Conjugator — All Tenses | English to Russian</title>
<meta name="description" content="Free Russian verb conjugator. Enter any verb in English or Russian and get past, present and future conjugations instantly.">
<link rel="canonical" href="https://englishtorussian.ai/verb-conjugator/">
<link rel="alternate" hreflang="en" href="https://englishtorussian.ai/verb-conjugator/">
<link rel="alternate" hreflang="ru" href="https://englishtorussian.ai/ru/verb-conjugator/">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg:#f5f7fb;--surface:#ffffff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--faint:#9ca3af;
    --primary:#4f6ef7;--primary-bg:rgba(79,110,247,0.08);--shadow:rgba(0,0,0,0.08);
  }
  [data-theme=dark] {
    --bg:#0f1117;--surface:#1a1d27;--border:#2d3148;--text:#e5e7eb;--muted:#9ca3af;--faint:#6b7280;
    --primary:#5b85f5;--primary-bg:rgba(91,133,245,0.12);--shadow:rgba(0,0,0,0.35);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .3s,color .3s;}
  a{color:var(--primary);text-decoration:none;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:99px;font-size:.84rem;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:all .2s;white-space:nowrap;}
  .pill:hover{border-color:var(--primary);color:var(--primary);}
  .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="max-w-2xl mx-auto px-4 py-6">

  <div class="flex gap-2 flex-wrap mb-6">
    <a href="/" class="pill">← Translator</a>
    <a href="/case-explainer/" class="pill">📚 Case Explainer</a>
    <a href="/flip-card/" class="pill">🃏 Flip Cards</a>
    <a href="/gap-fill/" class="pill">📝 Gap Fill</a>
    <a href="/listening/" class="pill">🎧 Listening</a>
    <a href="/ru/verb-conjugator/" class="pill">🇷🇺 RU</a>
    <button id="themeBtn" onclick="toggleTheme()" class="pill" style="border:none;cursor:pointer">🌙 Dark</button>
  </div>

  <h1 class="text-2xl font-extrabold mb-1" style="color:var(--primary)">⚡ Russian Verb Conjugator</h1>
  <p class="text-sm mb-6" style="color:var(--muted)">Enter a verb in English or Russian — get past, present &amp; future conjugations.</p>

  <div class="rounded-2xl p-5 sm:p-6 shadow mb-4" style="background:var(--surface);border:1px solid var(--border)">
    <div class="flex gap-2 mb-4">
      <input type="text" id="verbInput" placeholder="e.g. speak, говорить, go, писать…"
             class="flex-1 px-4 py-3 rounded-xl outline-none transition text-sm"
             style="background:var(--bg);border:2px solid var(--border);color:var(--text);font-family:inherit"
             onkeydown="if(event.key==='Enter') doConjugate()" />
      <button onclick="doConjugate()" class="px-5 py-3 rounded-xl text-white font-bold border-none cursor-pointer transition text-sm flex-shrink-0" style="background:var(--primary)">Conjugate</button>
    </div>
    <div id="conjugateLoading" style="display:none" class="text-center py-4"><div class="spinner"></div></div>
    <div id="conjugateResult" style="display:none"></div>
  </div>

</div>
<script>
function loadTheme(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
window.addEventListener('load',loadTheme);

async function fetchGoogle(text,sl,tl){const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(text);const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();return d[0].map(s=>s[0]).join('');}
const delay=ms=>new Promise(res=>setTimeout(res,ms));

async function doConjugate() {
  const raw = document.getElementById('verbInput').value.trim();
  if (!raw) { alert('✍️ Enter a verb first'); return; }
  document.getElementById('conjugateLoading').style.display = 'block';
  document.getElementById('conjugateResult').style.display  = 'none';
  try {
    let enVerb = raw;
    if (/[а-яёА-ЯЁ]/.test(raw)) { enVerb = await fetchGoogle(raw, 'ru', 'en'); }
    enVerb = enVerb.toLowerCase().replace(/^to\s+/, '').trim();
    const pronouns = {
      present: [
        {ru:'Я',en:'I '+enVerb+' every day'},{ru:'Ты',en:'you '+enVerb+' every day'},
        {ru:'Он',en:'he '+enVerb+'s every day'},{ru:'Она',en:'she '+enVerb+'s every day'},
        {ru:'Мы',en:'we '+enVerb+' every day'},{ru:'Вы',en:'you all '+enVerb+' every day'},
        {ru:'Они',en:'they '+enVerb+' every day'},
      ],
      past: [
        {ru:'Он',en:'he used to '+enVerb},{ru:'Она',en:'she used to '+enVerb},{ru:'Они',en:'they used to '+enVerb},
      ],
      future: [
        {ru:'Я',en:'I will '+enVerb},{ru:'Ты',en:'you will '+enVerb},{ru:'Он',en:'he will '+enVerb},
        {ru:'Она',en:'she will '+enVerb},{ru:'Мы',en:'we will '+enVerb},
        {ru:'Вы',en:'you all will '+enVerb},{ru:'Они',en:'they will '+enVerb},
      ],
    };
    async function conj(sentence, pronoun) {
      const full = await fetchGoogle(sentence,'en','ru');
      let form = full.replace(/[.!?]$/,'').trim();
      const preLower = pronoun.toLowerCase()+' ';
      if (form.toLowerCase().startsWith(preLower)) form = form.slice(preLower.length);
      form = form.replace(/\s+каждый день\.?$/i,'').trim();
      return form.charAt(0).toUpperCase()+form.slice(1);
    }
    const results = {};
    for (const [tense,rows] of Object.entries(pronouns)) {
      results[tense] = [];
      for (const row of rows) { results[tense].push({pronoun:row.ru,form:await conj(row.en,row.ru)}); await delay(80); }
    }
    document.getElementById('conjugateLoading').style.display = 'none';
    document.getElementById('conjugateResult').style.display  = 'block';
    document.getElementById('conjugateResult').innerHTML = renderConjugation(enVerb, results);
  } catch(err) {
    document.getElementById('conjugateLoading').style.display = 'none';
    document.getElementById('conjugateResult').style.display  = 'block';
    document.getElementById('conjugateResult').innerHTML = '<p style="color:#ef4444;font-size:.88rem">❌ Error: '+err.message+'</p>';
  }
}
function renderConjugation(verb, results) {
  const labels = {present:'🕐 Present',past:'📅 Past',future:'🔮 Future'};
  let html = '<div style="font-size:.78rem;color:var(--muted);margin-bottom:10px">Conjugations for: <strong style="color:var(--primary)">'+verb+'</strong></div>';
  for (const [tense,rows] of Object.entries(results)) {
    html += '<div style="margin-bottom:12px"><div style="font-size:.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--faint);font-weight:700;margin-bottom:6px">'+labels[tense]+'</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px">';
    for (const {pronoun,form} of rows) {
      html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:7px 10px"><span style="font-size:.72rem;color:var(--faint)">'+pronoun+'</span><div style="font-size:.92rem;color:var(--primary);font-weight:700;margin-top:1px">'+form+'</div></div>';
    }
    html += '</div></div>';
  }
  return html;
}
</script>
</body>
</html>
