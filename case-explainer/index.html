<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Russian Case Explainer — All 6 Cases | English to Russian</title>
<meta name="description" content="Free Russian case explainer. Enter any noun or adjective and see all 6 Russian cases with usage explained.">
<link rel="canonical" href="https://englishtorussian.ai/case-explainer/">
<link rel="alternate" hreflang="en" href="https://englishtorussian.ai/case-explainer/">
<link rel="alternate" hreflang="ru" href="https://englishtorussian.ai/ru/case-explainer/">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg:#f5f7fb;--surface:#ffffff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--faint:#9ca3af;
    --primary:#4f6ef7;--primary-bg:rgba(79,110,247,0.08);--shadow:rgba(0,0,0,0.08);
  }
  [data-theme=dark] {
    --bg:#0f1117;--surface:#1a1d27;--border:#2d3148;--text:#e5e7eb;--muted:#9ca3af;--faint:#6b7280;
    --primary:#5b85f5;--primary-bg:rgba(91,133,245,0.12);--shadow:rgba(0,0,0,0.35);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .3s,color .3s;}
  a{color:var(--primary);text-decoration:none;}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:7px 15px;border-radius:99px;font-size:.84rem;font-weight:500;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:all .2s;white-space:nowrap;}
  .pill:hover{border-color:var(--primary);color:var(--primary);}
  .spinner{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="max-w-2xl mx-auto px-4 py-6">

  <div class="flex gap-2 flex-wrap mb-6">
    <a href="/" class="pill">← Translator</a>
    <a href="/verb-conjugator/" class="pill">⚡ Verb Conjugator</a>
    <a href="/flip-card/" class="pill">🃏 Flip Cards</a>
    <a href="/gap-fill/" class="pill">📝 Gap Fill</a>
    <a href="/listening/" class="pill">🎧 Listening</a>
    <a href="/ru/case-explainer/" class="pill">🇷🇺 RU</a>
    <button id="themeBtn" onclick="toggleTheme()" class="pill" style="border:none;cursor:pointer">🌙 Dark</button>
  </div>

  <h1 class="text-2xl font-extrabold mb-1" style="color:var(--primary)">📚 Russian Case Explainer</h1>
  <p class="text-sm mb-6" style="color:var(--muted)">Enter a noun or adjective — see all 6 Russian cases with usage explained.</p>

  <div class="rounded-2xl p-5 sm:p-6 shadow mb-4" style="background:var(--surface);border:1px solid var(--border)">
    <div class="flex gap-2 mb-4">
      <input type="text" id="caseInput" placeholder="e.g. book, студент, красивый…"
             class="flex-1 px-4 py-3 rounded-xl outline-none transition text-sm"
             style="background:var(--bg);border:2px solid var(--border);color:var(--text);font-family:inherit"
             onkeydown="if(event.key==='Enter') doDecline()" />
      <button onclick="doDecline()" class="px-5 py-3 rounded-xl text-white font-bold border-none cursor-pointer transition text-sm flex-shrink-0" style="background:var(--primary)">Explain</button>
    </div>
    <div id="caseLoading" style="display:none" class="text-center py-4"><div class="spinner"></div></div>
    <div id="caseResult" style="display:none"></div>
  </div>

</div>
<script>
function loadTheme(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
function toggleTheme(){const t=document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',t);localStorage.setItem('theme',t);document.getElementById('themeBtn').textContent=t==='dark'?'☀️ Light':'🌙 Dark';}
window.addEventListener('load',loadTheme);

async function fetchGoogle(text,sl,tl){const url='https://translate.googleapis.com/translate_a/single?client=gtx&sl='+sl+'&tl='+tl+'&dt=t&q='+encodeURIComponent(text);const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);const d=await r.json();return d[0].map(s=>s[0]).join('');}
const delay=ms=>new Promise(res=>setTimeout(res,ms));

async function doDecline() {
  const raw = document.getElementById('caseInput').value.trim();
  if (!raw) { alert('✍️ Enter a word first'); return; }
  document.getElementById('caseLoading').style.display = 'block';
  document.getElementById('caseResult').style.display  = 'none';
  try {
    let enWord = raw, ruWord = raw;
    if (/[а-яёА-ЯЁ]/.test(raw)) { enWord = await fetchGoogle(raw,'ru','en'); ruWord = raw; }
    else { ruWord = await fetchGoogle(raw,'en','ru'); }
    enWord = enWord.toLowerCase().trim();
    const CASES = [
      {name:'Nominative',   ru:'Именительный', q:'Кто? Что?',     en:'This is '+enWord,        usage:'Subject of the sentence'},
      {name:'Genitive',     ru:'Родительный',  q:'Кого? Чего?',   en:'without '+enWord,        usage:'Possession, absence, negation'},
      {name:'Dative',       ru:'Дательный',    q:'Кому? Чему?',   en:'give to '+enWord,        usage:'Indirect object — to/for whom'},
      {name:'Accusative',   ru:'Винительный',  q:'Кого? Что?',    en:'I see '+enWord,          usage:'Direct object of action'},
      {name:'Instrumental', ru:'Творительный', q:'Кем? Чем?',     en:'with '+enWord,           usage:'By means of, together with'},
      {name:'Prepositional',ru:'Предложный',   q:'О ком? О чём?', en:'thinking about '+enWord, usage:'Location, topic of speech'},
    ];
    const caseResults = [];
    for (const c of CASES) {
      const translated = await fetchGoogle(c.en,'en','ru');
      const words = translated.replace(/[.!?]/g,'').trim().split(/\s+/);
      caseResults.push({...c, form:words[words.length-1]});
      await delay(80);
    }
    document.getElementById('caseLoading').style.display = 'none';
    document.getElementById('caseResult').style.display  = 'block';
    document.getElementById('caseResult').innerHTML = renderCases(enWord, ruWord, caseResults);
  } catch(err) {
    document.getElementById('caseLoading').style.display = 'none';
    document.getElementById('caseResult').style.display  = 'block';
    document.getElementById('caseResult').innerHTML = '<p style="color:#ef4444;font-size:.88rem">❌ Error: '+err.message+'</p>';
  }
}
function renderCases(enWord, ruWord, cases) {
  let html = '<div style="font-size:.78rem;color:var(--muted);margin-bottom:10px">Cases for: <strong style="color:var(--primary)">'+enWord+'</strong> / <strong style="color:var(--primary)">'+ruWord+'</strong></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">';
  for (const c of cases) {
    html += '<div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 11px"><div style="font-size:.7rem;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.8px">'+c.name+'</div><div style="font-size:.71rem;color:var(--muted);margin-top:1px">'+c.ru+' · '+c.q+'</div><div style="font-size:1.05rem;color:var(--primary);font-weight:700;margin:4px 0">'+c.form+'</div><div style="font-size:.71rem;color:var(--faint)">'+c.usage+'</div></div>';
  }
  return html+'</div>';
}
</script>
</body>
</html>
